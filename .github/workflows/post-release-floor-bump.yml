# Post-release floor bump. After a successful `v*` release, raise the
# Directory.Build.props `<Version>` / `<AssemblyVersion>` / `<FileVersion>`
# floor to the just-released version + `-dev` and open a PR.
#
# Why a workflow? The floor is used by every non-tag build (local + CI
# without a tag) as the "this is not a released version" marker. If it
# stays at the version BEFORE the last release, dev builds between
# releases carry the OLD version + `-dev`, which makes a crash report
# from a main-branch build look like it came from a stale era. Bumping
# the floor to the *just-released* version + `-dev` keeps the dev
# marker in lockstep with the latest tag, without hand-editing the
# file every release.
#
# Triggers ONLY on a tag push that the release pipeline already
# accepted (so a Release-Pipeline failure doesn't bump the floor).
# Opens a PR (rather than pushing to main directly) for the audit trail
# + CI gate, then queues rebase auto-merge so it lands hands-off the
# moment checks pass — no manual merge step. Because auto-merge WAITS for
# CI, a major / pre-release that warrants a different floor can still be
# hand-edited on the branch before it goes in. The branch is always
# recreated linearly from main so GitHub's rebase-merge (this repo is
# rebase-only) never refuses it over a stray merge commit.

name: Post-release floor bump

on:
  workflow_run:
    workflows: [Release]
    types: [completed]
  # Manual rerun handle for cases where the release succeeded but the
  # auto-PR step had a transient failure.
  workflow_dispatch:
    inputs:
      released_version:
        description: 'Released version that just shipped (e.g. 1.8.0). Floor will bump to that version + -dev.'
        required: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: post-release-floor-bump
  cancel-in-progress: false

jobs:
  bump:
    name: Bump Directory.Build.props floor
    # Only run when the Release workflow that triggered us completed
    # successfully. workflow_run fires regardless of conclusion, so a
    # failed Release shouldn't cascade into a floor bump.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.BOWIRE_DISPATCH_TOKEN }}
          fetch-depth: 0

      - name: Resolve released version
        id: ver
        env:
          # Route caller-controlled values through env vars so the shell
          # never sees them as inline template expansion — the canonical
          # mitigation for actions/code-injection. github.event.workflow_run.
          # head_branch is the tag name on a release trigger; inputs.
          # released_version is the manual-dispatch field.
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_VERSION: ${{ github.event.inputs.released_version }}
          RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          # Pull the released version from the trigger context. For
          # workflow_run, the head_branch carries the tag name (e.g.
          # `v1.8.0`); for workflow_dispatch we take the input verbatim.
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            RELEASED="$DISPATCH_VERSION"
          else
            RELEASED="${RUN_HEAD_BRANCH#v}"
          fi
          if [ -z "$RELEASED" ]; then
            echo "::error::could not resolve released version"
            exit 1
          fi
          # Sanity: must look like a semver triple, otherwise refuse.
          if ! echo "$RELEASED" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$'; then
            echo "::error::malformed released version: $RELEASED"
            exit 1
          fi
          # Strip any pre-release suffix (rc/beta) so the floor stays clean.
          BASE=$(echo "$RELEASED" | sed -E 's/-.*$//')
          echo "Released: $RELEASED → new floor: ${BASE}-dev"
          echo "released=$RELEASED" >> "$GITHUB_OUTPUT"
          echo "next=$BASE" >> "$GITHUB_OUTPUT"

      - name: Update Directory.Build.props
        env:
          NEXT: ${{ steps.ver.outputs.next }}
        run: |
          # Idempotent: only writes if the file actually changes. The
          # sed patterns mirror the three lines we ship today; if a
          # future refactor splits Version off into a separate file,
          # add the new path here.
          sed -i -E "s|<Version>[^<]+</Version>|<Version>${NEXT}-dev</Version>|" Directory.Build.props
          sed -i -E "s|<AssemblyVersion>[^<]+</AssemblyVersion>|<AssemblyVersion>${NEXT}</AssemblyVersion>|" Directory.Build.props
          sed -i -E "s|<FileVersion>[^<]+</FileVersion>|<FileVersion>${NEXT}</FileVersion>|" Directory.Build.props
          if git diff --quiet Directory.Build.props; then
            echo "::warning::no diff — floor already at ${NEXT}, skipping PR"
            echo "SKIP=true" >> "$GITHUB_ENV"
          fi

      - name: Open PR
        if: env.SKIP != 'true'
        env:
          GH_TOKEN: ${{ secrets.BOWIRE_DISPATCH_TOKEN }}
          RELEASED: ${{ steps.ver.outputs.released }}
          NEXT: ${{ steps.ver.outputs.next }}
        run: |
          BRANCH="chore/floor-bump-v${NEXT}"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          # Always (re)create the branch at the current main tip so it
          # stays a SINGLE linear commit. Reusing a diverged branch from a
          # prior run (or one GitHub's "Update branch" merged main into)
          # leaves a merge commit — and this repo is rebase-only, so
          # GitHub's rebase-merge then refuses it ("branch can't be
          # rebased") and the bump can't auto-merge. checkout keeps the
          # working-tree edit the previous step made; re-sed is idempotent.
          git checkout -B "$BRANCH"
          sed -i -E "s|<Version>[^<]+</Version>|<Version>${NEXT}-dev</Version>|" Directory.Build.props
          sed -i -E "s|<AssemblyVersion>[^<]+</AssemblyVersion>|<AssemblyVersion>${NEXT}</AssemblyVersion>|" Directory.Build.props
          sed -i -E "s|<FileVersion>[^<]+</FileVersion>|<FileVersion>${NEXT}</FileVersion>|" Directory.Build.props
          git add Directory.Build.props
          git commit -m "chore: bump floor to ${NEXT}-dev after v${RELEASED}"
          # Force — we deliberately reset the branch to a clean linear
          # commit; --force-with-lease guards against a concurrent push.
          git push -u --force-with-lease origin "$BRANCH"
          # Only open the PR if one doesn't already exist for this branch.
          if ! gh pr list --head "$BRANCH" --state open --json number -q '.[0].number' | grep -q .; then
            # No --label: this template is sibling-agnostic and a missing
            # label would make `gh pr create` fail. The PR needs no label
            # to auto-merge — our own `gh pr merge --auto` handles that.
            gh pr create \
              --title "chore: bump floor to ${NEXT}-dev (after v${RELEASED})" \
              --body "Routine post-release floor bump. The release pipeline derives the real version from the git tag; this PR raises the local + CI-without-tag floor to the just-released version so dev builds between releases carry an honest \`<released>-dev\` marker instead of a stale era marker." \
              --base main \
              --head "$BRANCH"
          else
            echo "PR already open for $BRANCH — force-pushed the linear bump, no new PR."
          fi
          # Hands-off: queue auto-merge (rebase) so the PR self-merges the
          # moment required checks go green — no manual merge step, nothing
          # to remember. Matches the cascade PRs' merge strategy
          # (--auto --rebase --delete-branch) so history stays linear and
          # the branch list lean. Auto-merge still WAITS for CI, so a major
          # / pre-release that warrants a different floor can be hand-edited
          # on the branch before it lands. Non-fatal if 'Allow auto-merge'
          # is off for the repo.
          gh pr merge "$BRANCH" --auto --rebase --delete-branch \
            || echo "::warning::could not enable auto-merge — is 'Allow auto-merge' on for the repo?"
